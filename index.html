<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Preparando...</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background: radial-gradient(circle at top,#1a0033,#0d001a,#050008);

color:white;
overflow:hidden;
position:relative;

}

/* brilho fundo corrigido */

body::before{

content:"";

position:absolute;

width:800px;
height:800px;

background:radial-gradient(circle,#ffd70033,transparent);

filter:blur(120px);

animation:moveGlow 10s infinite alternate;

pointer-events:none;
z-index:0;

}

@keyframes moveGlow{

from{
transform:translate(-30%,-30%);
}
to{
transform:translate(30%,30%);
}

}

/* container */

.card{

width:90%;
max-width:420px;

padding:45px 30px;

border-radius:20px;

background:#0b0015;

border:1px solid #24003d;

box-shadow:0 25px 60px rgba(0,0,0,.7);

text-align:center;

position:relative;
z-index:1;

}

/* titulo */

.title{

font-size:34px;
font-weight:700;

color:#ffd700;

margin-bottom:10px;

}

/* subtitulo */

.subtitle{

color:#e9d5ff;
margin-bottom:25px;

}

/* input corrigido */

.input{

width:100%;
padding:14px;

border-radius:12px;

border:1px solid #3b0764;

background:#140021;

color:white;

margin-bottom:20px;

outline:none;

position:relative;
z-index:2;

}

/* barra */

.progress{

width:100%;
height:16px;

background:#0b0015;

border-radius:20px;

border:1px solid #24003d;

overflow:hidden;

}

.bar{

height:100%;
width:0%;

background:linear-gradient(90deg,#ffd700,#a855f7);

box-shadow:0 0 12px #ffd700;

}

/* porcentagem */

.percent{

margin-top:12px;
color:#ffd700;

}

/* botão */

.btn{

display:block;
margin-top:30px;

padding:15px;

border-radius:30px;

background:linear-gradient(90deg,#ffd700,#a855f7);

color:#0b0015;

font-weight:700;

text-decoration:none;

text-align:center;

cursor:pointer;

}

</style>

</head>

<body>

<div class="card">

<div class="title">MEGA FEIRÃO</div>

<div class="subtitle">
Sua oferta está sendo preparada
</div>

<input class="input" id="nome" placeholder="Digite seu nome">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="percent" id="percent">0%</div>

<a class="btn" onclick="validar()">
CONTINUAR
</a>

</div>

<script>

let p=0
let bar=document.getElementById("bar")
let txt=document.getElementById("percent")

let loading=setInterval(()=>{

p++
bar.style.width=p+"%"
txt.innerText=p+"%"

if(p>=100) clearInterval(loading)

},40)

/* valida nome */

function validar(){

let nome=document.getElementById("nome").value

if(nome.trim()===""){
alert("Digite seu nome para continuar")
return
}

window.location.href="https://rsaclientsvipfeirao.github.io/feirao/inicio/"

}

</script>

</body>
</html>
